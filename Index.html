<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Absensi Sekolah</title>
    
    <!-- Meta untuk PWA (Agar bisa diinstal di HP) -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AbsensiQR">
    
    <!-- Link Manifest -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkUtQWJzZW5zaSBTZWtvbGFoIFFSIiwKICAic2hvcnRfbmFtZSI6ICJBYnNlbnNpUVIiLAogICJzdGFyd_VybCI6ICIuLyIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzI1NjNlYiIsCiAgInRoZW1lX2NvbG9yIjogIiMyNTYzZWIiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8xMDQ4LzEwNDg5NTMucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciLAogICAgICAicHVycG9zZSI6ICJhbnkgbWFza2FibGUiCiAgICB9CiAgXQp9">

    <!-- Tailwind & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb; }
        /* Fix for camera container on some mobile browsers */
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 1rem; object-fit: cover !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Notifikasi Instalasi -->
    <div id="install-banner" class="fixed bottom-24 left-4 right-4 bg-white p-4 rounded-2xl shadow-2xl border z-[100] hidden items-center justify-between animate-bounce">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="download"></i></div>
            <p class="text-xs font-bold">Pasang aplikasi di layar utama?</p>
        </div>
        <button onclick="installApp()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Pasang</button>
    </div>

    <!-- Login -->
    <div id="login-page" class="fixed inset-0 bg-blue-600 flex items-center justify-center p-6 z-[200]">
        <div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-xl text-center">
            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600">
                <i data-lucide="user-check"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">E-Absensi</h1>
            <p class="text-slate-400 text-sm mb-6">Login Admin Sekolah</p>
            <input type="text" id="user" placeholder="Username" class="w-full mb-3 p-4 rounded-xl bg-slate-100 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full mb-6 p-4 rounded-xl bg-slate-100 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Masuk</button>
            <p class="mt-4 text-[10px] text-slate-400">Kredensial: admin / admin123</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-content" class="hidden">
        <header class="p-6 bg-white border-b flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-bold text-xl text-blue-600 flex items-center gap-2"><i data-lucide="qr-code"></i> E-Absensi</h2>
            <button onclick="logout()" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </header>

        <!-- Dashboard -->
        <main id="view-home" class="p-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl border">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Hadir</p>
                    <h3 id="stat-hadir" class="text-2xl font-bold text-green-600">0</h3>
                </div>
                <div class="bg-white p-4 rounded-2xl border">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Total Siswa</p>
                    <h3 id="stat-total" class="text-2xl font-bold">0</h3>
                </div>
            </div>
            <div class="bg-white rounded-2xl border overflow-hidden">
                <div class="p-4 border-b bg-slate-50 font-bold text-xs uppercase tracking-wider text-slate-500">Log Kehadiran Hari Ini</div>
                <div id="log-container" class="divide-y">
                    <div class="p-8 text-center text-slate-400 text-xs italic">Belum ada data aktivitas</div>
                </div>
            </div>
        </main>

        <!-- Scanner -->
        <main id="view-scan" class="hidden p-6">
            <div class="bg-white p-4 rounded-3xl border shadow-xl">
                <div id="reader" class="rounded-2xl overflow-hidden bg-slate-900"></div>
                <div id="scan-res" class="mt-4 p-4 bg-green-50 text-green-700 rounded-xl hidden text-center font-bold text-sm"></div>
                <div id="camera-error" class="mt-4 p-4 bg-red-50 text-red-600 rounded-xl hidden text-center text-xs">
                    Gagal mengakses kamera. Pastikan izin kamera diberikan dan situs menggunakan HTTPS.
                </div>
            </div>
        </main>

        <!-- Data Siswa -->
        <main id="view-students" class="hidden p-6 space-y-6">
            <div class="bg-white p-5 rounded-2xl border space-y-3">
                <h4 class="font-bold text-sm uppercase text-slate-400">Input Siswa Baru</h4>
                <input id="new-name" type="text" placeholder="Nama Lengkap" class="w-full p-3 rounded-xl bg-slate-50 border outline-none text-sm">
                <input id="new-nis" type="text" placeholder="NIS" class="w-full p-3 rounded-xl bg-slate-50 border outline-none text-sm">
                <button onclick="addSiswa()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Generate QR Card</button>
            </div>
            <div id="student-list" class="grid grid-cols-1 gap-4"></div>
        </main>

        <!-- Navbar -->
        <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white border-t flex justify-around items-center px-4 z-40">
            <button onclick="nav('home')" id="nav-home" class="flex flex-col items-center gap-1 active-tab">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Beranda</span>
            </button>
            <button onclick="nav('scan')" id="nav-scan" class="flex flex-col items-center gap-1 text-slate-400">
                <div class="bg-blue-600 text-white p-3 rounded-2xl -mt-10 shadow-lg shadow-blue-200">
                    <i data-lucide="scan" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold">Scan</span>
            </button>
            <button onclick="nav('students')" id="nav-students" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Siswa</span>
            </button>
        </nav>
    </div>

    <script>
        const KEY = "SECRET_ABSENSI_KEY";
        let db = JSON.parse(localStorage.getItem('absensi_v2')) || { students: [], attendance: [] };
        let html5QrCode = null;
        let deferredPrompt = null;

        // PWA Installation Support
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'flex';
        });

        async function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('install-banner').style.display = 'none';
            }
            deferredPrompt = null;
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if((u === 'admin' && p === 'admin123') || (u === '' && p === '')) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                init();
            } else {
                alert("Username atau Password salah!");
            }
        }

        function logout() {
            if(confirm("Apakah Anda ingin keluar?")) {
                location.reload();
            }
        }

        function init() {
            lucide.createIcons();
            renderStudents();
            renderLogs();
            updateStats();
        }

        function nav(v) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            
            ['home', 'scan', 'students'].forEach(b => {
                const btn = document.getElementById(`nav-${b}`);
                btn.classList.remove('active-tab');
                btn.classList.add('text-slate-400');
            });
            document.getElementById(`nav-${v}`).classList.add('active-tab');
            
            if(v === 'scan') {
                setTimeout(startScan, 100); // Slight delay for DOM rendering
            } else {
                stopScan();
            }
        }

        function encrypt(nis) {
            return CryptoJS.AES.encrypt(JSON.stringify({nis: nis, ts: Date.now()}), KEY).toString();
        }

        function decrypt(cipher) {
            try {
                const bytes = CryptoJS.AES.decrypt(cipher, KEY);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                return decryptedText ? JSON.parse(decryptedText) : null;
            } catch(e) { return null; }
        }

        function addSiswa() {
            const name = document.getElementById('new-name').value.trim();
            const nis = document.getElementById('new-nis').value.trim();
            if(!name || !nis) return alert("Mohon lengkapi data siswa");
            
            db.students.push({ id: Date.now(), name, nis });
            save();
            renderStudents();
            updateStats();
            document.getElementById('new-name').value = '';
            document.getElementById('new-nis').value = '';
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            list.innerHTML = db.students.map(s => `
                <div class="bg-white p-4 rounded-2xl border flex items-center gap-4">
                    <div id="qr-${s.id}" class="bg-white p-1 border rounded-lg shrink-0"></div>
                    <div class="overflow-hidden w-full">
                        <p class="font-bold text-sm truncate">${s.name}</p>
                        <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase">${s.nis}</p>
                        <button onclick="hapusSiswa(${s.id})" class="text-[10px] text-red-500 mt-1 font-bold">Hapus Siswa</button>
                    </div>
                </div>
            `).join('');
            
            db.students.forEach(s => {
                const qrContainer = document.getElementById(`qr-${s.id}`);
                if (qrContainer) {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, { 
                        text: encrypt(s.nis), 
                        width: 64, 
                        height: 64,
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            });
        }

        function hapusSiswa(id) {
            if(confirm("Hapus data siswa ini?")) {
                db.students = db.students.filter(s => s.id !== id);
                save(); 
                renderStudents(); 
                updateStats();
            }
        }

        async function startScan() {
            const errorDiv = document.getElementById('camera-error');
            errorDiv.classList.add('hidden');
            
            try {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }
                
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (decodedText) => {
                        const data = decrypt(decodedText);
                        if(data) {
                            const s = db.students.find(x => x.nis === data.nis);
                            if(s) record(s);
                        }
                    }
                );
            } catch (err) {
                console.error("Camera Error:", err);
                errorDiv.classList.remove('hidden');
            }
        }

        async function stopScan() { 
            if(html5QrCode && html5QrCode.isScanning) { 
                try {
                    await html5QrCode.stop();
                } catch (err) {
                    console.error("Stop Scan Error:", err);
                }
            } 
        }

        function record(s) {
            const today = new Date().toDateString();
            const isAlreadyPresent = db.attendance.find(a => a.nis === s.nis && new Date(a.raw).toDateString() === today);
            
            const res = document.getElementById('scan-res');
            res.classList.remove('hidden');

            if(isAlreadyPresent) {
                res.innerText = `${s.name} sudah absen hari ini`;
                res.className = "mt-4 p-4 bg-amber-50 text-amber-700 rounded-xl block text-center font-bold text-sm";
            } else {
                db.attendance.unshift({ 
                    name: s.name, 
                    nis: s.nis, 
                    time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                    raw: Date.now()
                });
                save(); 
                renderLogs(); 
                updateStats();
                res.innerText = `BERHASIL: ${s.name} hadir!`;
                res.className = "mt-4 p-4 bg-green-50 text-green-700 rounded-xl block text-center font-bold text-sm";
            }

            setTimeout(() => res.classList.add('hidden'), 3000);
        }

        function renderLogs() {
            const log = document.getElementById('log-container');
            if(db.attendance.length === 0) {
                log.innerHTML = '<div class="p-8 text-center text-slate-400 text-xs italic">Belum ada data aktivitas</div>';
                return;
            }
            log.innerHTML = db.attendance.map(a => `
                <div class="p-4 flex justify-between items-center bg-white border-b">
                    <div>
                        <p class="font-bold text-xs">${a.name}</p>
                        <p class="text-[9px] text-slate-400 uppercase">${a.time} - Terverifikasi</p>
                    </div>
                    <div class="bg-green-100 p-1.5 rounded-full">
                        <i data-lucide="check" class="text-green-600 w-3 h-3"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateStats() {
            document.getElementById('stat-hadir').innerText = db.attendance.length;
            document.getElementById('stat-total').innerText = db.students.length;
        }

        function save() { 
            localStorage.setItem('absensi_v2', JSON.stringify(db)); 
        }
    </script>
</body>
</html>
